    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit Sharma SVG</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f0f4f8;
        margin: 0;
    }
</style>
</head>
<body>

<svg width="350" height="450" viewBox="0 0 350 450">
    <!-- Background -->
    <rect width="350" height="450" fill="#e6f2ff"/>

    <!-- Jersey -->
    <path d="M90 280 L260 280 L290 450 L60 450 Z"
          fill="#0066cc"/>

    <!-- Neck -->
    <rect x="150" y="230" width="50" height="50"
          fill="#d8a27f"/>

    <!-- Face -->
    <circle cx="175" cy="170" r="90"
            fill="#d8a27f"/>

    <!-- Hair -->
    <path d="M90 160
             C90 70,260 70,260 160
             L260 120
             C240 40,110 40,90 120 Z"
          fill="#222"/>

    <!-- Eyes -->
    <ellipse cx="145" cy="165" rx="10" ry="6" fill="#222"/>
    <ellipse cx="205" cy="165" rx="10" ry="6" fill="#222"/>

    <!-- Nose -->
    <path d="M175 175 L168 200 L182 200"
          stroke="#8a5a44"
          stroke-width="2"
          fill="none"/>

    <!-- Mustache -->
    <path d="M145 215
             Q175 230 205 215"
          stroke="#222"
          stroke-width="5"
          fill="none"/>

    <!-- Beard -->
    <path d="M120 210
             Q175 290 230 210"
          fill="#222"/>

    <!-- Mouth -->
    <path d="M155 235
             Q175 245 195 235"
          stroke="#aa4444"
          stroke-width="3"
          fill="none"/>

    <!-- Jersey Text -->
    <text x="175" y="340"
          text-anchor="middle"
          fill="white"
          font-size="28"
          font-family="Arial"
          font-weight="bold">
        INDIA
    </text>

    <!-- Name -->
    <text x="175" y="420"
          text-anchor="middle"
          fill="white"
          font-size="18"
          font-family="Arial">
        Rohit Sharma
    </text>
</svg>

</body>
</html>
    
</body>
</html>
