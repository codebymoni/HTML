<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student admission Form</title>
</head>
<body>
    <h1>Student Admission Form</h1>
    <form>
        <label for="#"> student name:</label>
        <input type="text" name="#" id="#"
        placeholder="Enter your name"><br><br>
        <label for="#"> father's name:</label>
        <input type="text" name="#" id="#"
        placeholder="Enter your father's name"><br><br>
        <label for="#"> Mother's name:</label>
        <input type="text" name="#" id="#"
        placeholder="Enter your mother's name"><br><br>
        <label for="#"> email:</label>
        <input type="email" name="#" id="#"
        placeholder="Enter your email"><br><br>
        <label for="#"> mobile:</label>
        <input type="tel" name="#" id="#"
        placeholder="Enter your mobile number"><br><br>
        <label for="#"> date of birth:</label>
        <input type="date" name="#" id="#"
        placeholder="Enter your date of birth"><br><br>
        gender:
        <input type="radio" name="gender" value="male">male
        <input type="radio" name="gender" value="female">female<br><br>
        address:
        <textarea  cols="30" rows="5"></textarea><br><br>
    
        hobbies:
        <input type="checkbox" name="hobby" value="reading"> reading
        <input type="checkbox" name="hobby" value="writing"> writing
        <input type="checkbox" name="hobby" value="swimming"> swimming<br><br>
        course:
        <select>
            <option value="">Select a course</option>
            <option value="co">computer</option>
            <option value="ai">artificial intelligence</option>
            <option value="ee">electrical </option>
        </select><br><br>
        
        upload photo:
        <input type="file" name="#" id="#"><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

        
    </form>
</body>
</html>
